<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0054a6" />
  <meta name="description" content="Rádio Cultura FM 104.7 - Ouça ao vivo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cultura FM" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <title>Cultura FM 104.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0054a6;
      --blue-dark: #003d7a;
      --blue-light: #1a7fe8;
      --glow: rgba(0, 84, 166, 0.6);
      --off-white: #e8f0fb;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020d1f;
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0,84,166,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% -10%, rgba(26,127,232,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 2rem;
      text-align: center;
    }

    .freq-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.4em;
      color: var(--blue-light);
      opacity: 0.7;
      text-transform: uppercase;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      width: clamp(200px, 50vw, 280px);
      height: clamp(200px, 50vw, 280px);
      border-radius: 50%;
    }

    .ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--blue-light);
      opacity: 0;
      pointer-events: none;
    }

    .playing-active .ring:nth-child(1) { animation: ring-pulse 2s ease-out 0.00s infinite; }
    .playing-active .ring:nth-child(2) { animation: ring-pulse 2s ease-out 0.66s infinite; }
    .playing-active .ring:nth-child(3) { animation: ring-pulse 2s ease-out 1.32s infinite; }

    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      box-shadow: 0 0 0 0 var(--glow);
      transition: box-shadow 0.5s ease;
    }

    .playing-active .logo-wrap::before {
      box-shadow: 0 0 40px 10px var(--glow);
    }

    .logo-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid rgba(0,84,166,0.5);
      transition: border-color 0.3s ease, filter 0.3s ease;
      filter: brightness(0.95);
    }

    .playing-active .logo-img {
      border-color: var(--blue-light);
      filter: brightness(1.1);
      animation: slow-pulse 3s ease-in-out infinite;
    }

    @keyframes slow-pulse {
      0%, 100% { filter: brightness(1.1); }
      50%       { filter: brightness(1.2); }
    }

    /* Status */
    .status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .live-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c85a;
      opacity: 0;
      transition: opacity 0.4s ease;
      box-shadow: 0 0 8px #00c85a;
    }

    .live-dot.visible {
      opacity: 1;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .eq-bars.visible { opacity: 1; }

    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--blue-light);
    }

    .eq-bars.visible .eq-bar:nth-child(1) { animation: eq 1.1s ease-in-out 0.00s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(2) { animation: eq 1.1s ease-in-out 0.20s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(3) { animation: eq 1.1s ease-in-out 0.40s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(4) { animation: eq 1.1s ease-in-out 0.15s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(5) { animation: eq 1.1s ease-in-out 0.35s infinite alternate; }

    @keyframes eq {
      from { height: 4px; }
      to   { height: 18px; }
    }

    .status-text {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--off-white);
      transition: color 0.4s ease;
    }

    .status-text.playing { color: var(--blue-light); }

    /* Play button */
    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
      box-shadow: 0 0 20px rgba(0,84,166,0.5);
    }

    .play-btn:hover  { background: var(--blue-light); transform: scale(1.08); box-shadow: 0 0 30px rgba(26,127,232,0.6); }
    .play-btn:active { transform: scale(0.95); }
    .play-btn.loading { opacity: 0.6; animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Social */
    .social-row {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      text-decoration: none;
    }

    .social-btn:hover { background: rgba(26,127,232,0.35); transform: scale(1.1); }

    /* Tagline */
    .tagline {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="freq-label">FM &nbsp;104.7 &nbsp;MHz</div>

    <div class="logo-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <img
        class="logo-img"
        src="https://i.postimg.cc/WbzzMm6f/logo-radio-cultura.jpg"
        alt="Rádio Cultura FM 104.7"
        draggable="false"
      />
    </div>

    <div class="status-wrap">
      <div class="live-row">
        <div class="live-dot" id="liveDot"></div>
        <div class="eq-bars" id="eqBars">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
      </div>
      <span class="status-text" id="statusText">Toque para ouvir</span>
    </div>

    <button class="play-btn" id="playBtn" aria-label="Tocar rádio">
      <svg id="iconPlay" viewBox="0 0 24 24" style="display:block;width:28px;height:28px;fill:white"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none;width:28px;height:28px;fill:white"><rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/></svg>
    </button>

    <div class="social-row">
      <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook" class="social-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram" class="social-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
    </div>
  </div>

  <span class="tagline">Rádio Cultura &mdash; Guaíra</span>

  <audio id="audio" preload="none"></audio>

  <script>
    const btn       = document.getElementById('playBtn');
    const audio     = document.getElementById('audio');
    const statusTxt = document.getElementById('statusText');
    const liveDot   = document.getElementById('liveDot');
    const eqBars    = document.getElementById('eqBars');
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const container = document.querySelector('.container');
    const STREAM    = 'https://ice.fabricahost.com.br/radioculturaguaira';

    let isPlaying = false;

    function setPlaying(state) {
      isPlaying = state;
      container.classList.toggle('playing-active', state);
      btn.classList.remove('loading');
      statusTxt.textContent = state ? 'Tocando agora...' : 'Toque para ouvir';
      statusTxt.classList.toggle('playing', state);
      liveDot.classList.toggle('visible', state);
      eqBars.classList.toggle('visible', state);
      iconPlay.style.display  = state ? 'none'  : 'block';
      iconPause.style.display = state ? 'block' : 'none';
    }

    btn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        audio.src = '';
        setPlaying(false);
      } else {
        btn.classList.add('loading');
        statusTxt.textContent = 'Conectando...';
        audio.src = STREAM;
        audio.load();
        audio.play().catch(() => {
          btn.classList.remove('loading');
          statusTxt.textContent = 'Toque para ouvir';
        });
      }
    });

    audio.addEventListener('playing', () => setPlaying(true));
    audio.addEventListener('pause',   () => setPlaying(false));
    audio.addEventListener('error',   () => { setPlaying(false); statusTxt.textContent = 'Erro na conexão'; });
    audio.addEventListener('waiting', () => { btn.classList.add('loading'); statusTxt.textContent = 'Bufferizando...'; });
    audio.addEventListener('canplay', () => btn.classList.remove('loading'));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
