<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0054a6" />
  <meta name="description" content="Rádio Cultura FM 104.7 - Ouça ao vivo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cultura FM" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://i.postimg.cc/WbzzMm6f/logo-radio-cultura.jpg" />
  <title>Cultura FM 104.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0054a6;
      --blue-dark: #003d7a;
      --blue-light: #1a7fe8;
      --glow: rgba(0, 84, 166, 0.6);
      --white: #ffffff;
      --off-white: #e8f0fb;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020d1f;
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(0, 84, 166, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% -10%, rgba(26, 127, 232, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% -5%, rgba(0, 84, 166, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2rem;
      text-align: center;
    }

    /* Frequency label */
    .freq-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.4em;
      color: var(--blue-light);
      opacity: 0.7;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    /* Logo / Play Button */
    .logo-btn {
      position: relative;
      width: clamp(200px, 50vw, 280px);
      height: clamp(200px, 50vw, 280px);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Pulse rings */
    .ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--blue-light);
      opacity: 0;
      pointer-events: none;
    }

    .logo-btn.playing .ring:nth-child(1) {
      animation: ring-pulse 2s ease-out infinite;
    }
    .logo-btn.playing .ring:nth-child(2) {
      animation: ring-pulse 2s ease-out 0.66s infinite;
    }
    .logo-btn.playing .ring:nth-child(3) {
      animation: ring-pulse 2s ease-out 1.32s infinite;
    }

    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* Glow halo */
    .logo-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: transparent;
      box-shadow: 0 0 0 0 var(--glow);
      transition: box-shadow 0.5s ease;
    }

    .logo-btn:hover::before,
    .logo-btn.playing::before {
      box-shadow: 0 0 40px 10px var(--glow);
    }

    /* Logo image */
    .logo-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid rgba(0, 84, 166, 0.5);
      transition: transform 0.3s ease, border-color 0.3s ease, filter 0.3s ease;
      filter: brightness(0.9);
    }

    .logo-btn:hover .logo-img {
      transform: scale(1.04);
      border-color: var(--blue-light);
      filter: brightness(1.05);
    }

    .logo-btn.playing .logo-img {
      border-color: var(--blue-light);
      filter: brightness(1.1);
      animation: slow-pulse 3s ease-in-out infinite;
    }

    @keyframes slow-pulse {
      0%, 100% { filter: brightness(1.1); }
      50%       { filter: brightness(1.2); }
    }

    /* Overlay icon */
    .play-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 84, 166, 0.35);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .logo-btn:hover .play-overlay {
      opacity: 1;
    }

    .play-overlay svg {
      width: 52px;
      height: 52px;
      fill: white;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* Status text */
    .status-wrap {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .status-text {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--off-white);
      transition: color 0.4s ease;
    }

    .status-text.playing {
      color: var(--blue-light);
    }

    /* Live dot indicator */
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00c85a;
      opacity: 0;
      transition: opacity 0.4s ease;
      box-shadow: 0 0 8px #00c85a;
    }

    .live-dot.visible {
      opacity: 1;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .live-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Equalizer bars */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .eq-bars.visible { opacity: 1; }

    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--blue-light);
    }

    .eq-bars.visible .eq-bar:nth-child(1) { animation: eq 1.1s ease-in-out 0.0s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(2) { animation: eq 1.1s ease-in-out 0.2s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(3) { animation: eq 1.1s ease-in-out 0.4s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(4) { animation: eq 1.1s ease-in-out 0.15s infinite alternate; }
    .eq-bars.visible .eq-bar:nth-child(5) { animation: eq 1.1s ease-in-out 0.35s infinite alternate; }

    @keyframes eq {
      from { height: 4px; }
      to   { height: 18px; }
    }

    /* Bottom tagline */
    .tagline {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      z-index: 1;
    }

    /* Loading spinner when buffering */
    .logo-btn.loading .logo-img {
      animation: none;
    }

    .logo-btn.loading::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--blue-light);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="freq-label">FM &nbsp;104.7 &nbsp;MHz</div>

    <button class="logo-btn" id="playBtn" aria-label="Tocar rádio">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <img
        class="logo-img"
        src="https://i.postimg.cc/WbzzMm6f/logo-radio-cultura.jpg"
        alt="Rádio Cultura FM 104.7"
        draggable="false"
      />
      <div class="play-overlay" id="overlay">
        <svg id="iconPlay" viewBox="0 0 24 24" style="display:block"><polygon points="5,3 19,12 5,21"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </div>
    </button>

    <div class="status-wrap">
      <div class="live-row">
        <div class="live-dot" id="liveDot"></div>
        <div class="eq-bars" id="eqBars">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
      </div>
      <span class="status-text" id="statusText">Toque para ouvir</span>
    </div>
  </div>

  <span class="tagline">Rádio Cultura &mdash; Guaraíra</span>

  <audio id="audio" preload="none">
    <source src="https://ice.fabricahost.com.br/radioculturaguaira" type="audio/mpeg" />
  </audio>

  <script>
    const btn       = document.getElementById('playBtn');
    const audio     = document.getElementById('audio');
    const statusTxt = document.getElementById('statusText');
    const liveDot   = document.getElementById('liveDot');
    const eqBars    = document.getElementById('eqBars');
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');

    let isPlaying = false;

    function setPlaying(state) {
      isPlaying = state;
      btn.classList.toggle('playing', state);
      btn.classList.remove('loading');
      statusTxt.textContent = state ? 'Tocando agora...' : 'Toque para ouvir';
      statusTxt.classList.toggle('playing', state);
      liveDot.classList.toggle('visible', state);
      eqBars.classList.toggle('visible', state);
      iconPlay.style.display  = state ? 'none'  : 'block';
      iconPause.style.display = state ? 'block' : 'none';
    }

    btn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        audio.src = '';
        setPlaying(false);
      } else {
        btn.classList.add('loading');
        statusTxt.textContent = 'Conectando...';
        audio.src = 'https://ice.fabricahost.com.br/radioculturaguaira';
        audio.load();
        audio.play().catch(() => {
          btn.classList.remove('loading');
          statusTxt.textContent = 'Toque para ouvir';
        });
      }
    });

    audio.addEventListener('playing', () => setPlaying(true));
    audio.addEventListener('pause',   () => setPlaying(false));
    audio.addEventListener('error',   () => { setPlaying(false); statusTxt.textContent = 'Erro na conexão'; });
    audio.addEventListener('waiting', () => {
      btn.classList.add('loading');
      statusTxt.textContent = 'Bufferizando...';
    });
    audio.addEventListener('canplay', () => btn.classList.remove('loading'));

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
